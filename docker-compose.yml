services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll
      POSTGRES_DB: payroll
    ports:
      - "5432:5432"
    volumes:
      - payroll_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - payroll_redis_data:/data

volumes:
  payroll_pg_data:
  payroll_redis_data:
