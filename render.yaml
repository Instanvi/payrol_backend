# Render Blueprint — payrol_backend
# Docs: https://render.com/docs/blueprint-spec
#
# If you created the service manually, set in the Render dashboard:
#   Root Directory: (leave blank)
#   Build Command:  npm ci --include=dev && npm run build
#   Start Command:  npm start
#   Release Command: npm run db:migrate

services:
  - type: web
    name: payment-backend
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    releaseCommand: npm run db:migrate
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_PAYMENT_WORKER
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: payment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: INSTANVI_PAYMENTS_BASE_URL
        sync: false
      - key: INSTANVI_API_KEY
        sync: false
      - key: INSTANVI_CALLBACK_URL
        sync: false

  - type: worker
    name: payment-worker
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run worker:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: payment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: INSTANVI_PAYMENTS_BASE_URL
        sync: false
      - key: INSTANVI_API_KEY
        sync: false
      - key: INSTANVI_CALLBACK_URL
        sync: false

  - type: redis
    name: payment-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: payment-db
    plan: free
